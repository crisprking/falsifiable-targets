claim:
  target_symbol: "BACE1"
  uniprot_id: "P56817"
  indication: "Alzheimer disease (mild-to-moderate, symptomatic)"
  mechanism: |
    BACE1 cleaves APP at the beta-site. APP A673T (Jonsson 2012) is
    approximately five-fold protective. Every Phase 3 BACE1 inhibitor
    trial has failed efficacy or shown cognitive worsening.
  claim_type: validated_mechanism
  citation_pmid: "22801501"
