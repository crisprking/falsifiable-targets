  genetics:
    gwas_hits: 6
    mendelian_evidence: true
    loss_of_function_phenotype: "APP A673T protective"
    clinical_outcome_contested: true
  expression:      {target_tissue_expressed: true}
  reproducibility: {retracted: false, rebuttals_count: 0, independent_replications: 80}
  selectivity:
