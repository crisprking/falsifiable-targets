# Classic R6_chemistry_class_collapse trigger: ChEMBL hits cluster on a
# different Pfam class than the claimed target.
claim:
  target_symbol: "SAT_PATHOGEN_HOMOLOG_X"
  uniprot_id: "X0X0X0"
  indication: "Tropical fungal infection (synthetic test target)"
